<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You | Adil Shaikh</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f8fafc;
            font-family:'Poppins',sans-serif;
        }

        .thank-you-box{

            background:white;
            width:600px;
            max-width:90%;
            padding:50px;

            text-align:center;

            border-radius:20px;

            box-shadow:0 15px 35px rgba(0,0,0,.1);

        }

        .thank-you-box i{

            font-size:70px;

            color:#2563eb;

            margin-bottom:25px;

        }

        .thank-you-box h1{

            color:#0f172a;

            margin-bottom:20px;

        }

        .thank-you-box p{

            color:#64748b;

            line-height:1.8;

            margin-bottom:35px;

        }

        .thank-you-box a{

            display:inline-block;

            padding:15px 30px;

            background:#2563eb;

            color:white;

            text-decoration:none;

            border-radius:10px;

            transition:.3s;

        }

        .thank-you-box a:hover{

            background:#1d4ed8;

            transform:translateY(-3px);

        }

    </style>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="thank-you-box">

<i class="fas fa-circle-check"></i>

<h1>Thank You!</h1>

<p>

Your message has been sent successfully.

I appreciate you reaching out.

I will respond as soon as possible.

</p>

<a href="index.html">

Back to Portfolio

</a>

</div>

</body>

</html>
